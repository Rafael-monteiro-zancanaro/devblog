<div class="flex flex-row justify-center w-screen pt-8 px-4 sm:px-6 md:px-8 min-h-screen">
    <div class="flex flex-col bg-base2-500 w-full max-w-7xl">
        <div class="flex flex-row ml-2 sm:ml-6 md:ml-10 pb-8 sm:pb-10 md:pb-12">
            <img src="DevBlog.svg" class="w-32 sm:w-36 md:w-48" />
        </div>

        <div class="flex flex-col md:flex-row gap-6 md:gap-3 ml-0 sm:ml-6 md:ml-10">
            <div class="w-full md:w-auto">
                <app-navigation />
            </div>

            <div class="flex-1 px-4 sm:px-6 md:px-0 md:pr-8">
                @defer {
                <router-outlet />
                } @loading (after 100ms; minimum 500ms) {
                <app-loading />
                } @error {
                <div class="text-red-500 p-4">
                    Erro ao carregar conteúdo.
                </div>
                }
            </div>
        </div>
    </div>
</div>
