<div class="w-full h-full">
    <div class="flex flex-col">
        <h1 class="text-2xl sm:text-3xl font-display font-medium break-words">
            Bem vindo ao meu Dev Blog Pessoal!
        </h1>

        <h2 class="text-lg sm:text-xl font-display font-light text-gray-500 italic pb-5 break-words">
            Estas são as ultimas postagens que fiz
        </h2>
        <div class="flex flex-col space-y-4 items-center">
            @for (post of posts(); track $index) {
            <app-post-card [postInfo]="post" />
            }
        </div>
    </div>
</div>
